<div class="login-card">
  <div class="login-header">
    <h1 class="text-3xl">Đăng nhập hệ thống</h1>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="username">Tên đăng nhập</label>
      <input
        type="text"
        class="username text-black"
        formControlName="username"
        placeholder="Nhập username..."
        [class.is-invalid]="
          loginForm.get('username')?.touched && loginForm.get('username')?.invalid
        "
      />
    </div>

    <div class="form-group">
      <label for="password">Mật khẩu</label>
      <input
        type="text"
        class="password text-black"
        formControlName="password"
        placeholder="Nhập password..."
        [class.is-invalid]="
          loginForm.get('password')?.touched && loginForm.get('password')?.invalid
        "
      />
    </div>

    <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>

    <button type="submit" class="btn-login">Đăng nhập</button>
  </form>
</div>
